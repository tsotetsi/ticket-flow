volumes:
  userservice_local_postgres_data: {}
  userservice_local_postgres_data_backups: {}
  userservice_local_postgres_initdb: {}

services:
  postgres-service:
    image: postgres:latest
    container_name: user_service_postgres_db
    env_file:
      - ./.envs/.local/.postgres
    volumes:
      - userservice_local_postgres_data:/var/lib/postgresql/data # Persistent data storage.
      - userservice_local_postgres_initdb:/docker-entrypoint-initdb.d # Mount initialization scripts.
#    ports:
#      - "5432:5432" # We have local instance of postgres running.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_dev_local -d user_service_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis-service:
    image: redis:latest
    container_name: user_service_redis_db
#    ports:
#      - "6380:6380" # because we have local instance running on 6379.

  prometheus-service:
    image: prom/prometheus:latest
    container_name: user_service_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    depends_on:
      - user-service

  grafana-service:
    image: grafana/grafana:latest
    container_name: user_service_grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus-service
  user-service:
    depends_on:
      - postgres-service
      - redis-service
    build:
      context: .
      dockerfile: ./compose/local/user-service/Dockerfile
    image: tsotetsi/ticketflow-user-service:v1.0.0.alpha
    container_name: ticketflow-local-userservice
    env_file:
      - ./.envs/.local/.userservice
    ports:
      - '8000:8000'
    command: /start